<div class="user-menu-container">
    <img
    [ngSrc]="imageSrc"
    [height]="44"
    [width]="44"
    alt="Profile Picture"
    class="profile-picture">
    <div class="name-display">
    <span class="displayed-name">
        {{ displayedName }}
    </span>
    <span class="user-name">
        {{ userName }}
    </span>
    </div>
</div>
