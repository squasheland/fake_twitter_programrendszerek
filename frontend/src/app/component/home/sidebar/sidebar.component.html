<nav class="sidebar" aria-label="User navigation">
  <div class="nav-section">
    <a class="nav-btn" routerLink="/" aria-label="Home">
      <mat-icon aria-hidden="true">home</mat-icon>
      <span>Home</span>
    </a>
  </div>

  @if (currentUser(); as user) {
    <a
      class="nav-btn profile-nav-btn"
      [routerLink]="['/profile', user.username]"
      aria-label="Go to your profile"
    >
      @if (user.pfp && (user.pfp.startsWith('http://') || user.pfp.startsWith('https://'))) {
        <img
          [src]="user.pfp"
          width="40"
          height="40"
          [alt]="user.displayName + ' profile picture'"
          class="sidebar-pfp"
        />
      } @else {
        <div class="sidebar-pfp-fallback" aria-hidden="true">
          {{ user.displayName.charAt(0).toUpperCase() }}
        </div>
      }
      <div class="sidebar-name-block">
        <span class="sidebar-display-name">{{ user.displayName }}</span>
        <span class="sidebar-username">@{{ user.username }}</span>
      </div>
    </a>
  }
</nav>
